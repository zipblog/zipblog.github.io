<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZIP - Home</title>
    <meta name="description" content="ZIP Design Prototype - Interactive Grid Portfolio">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400&display=swap" rel="stylesheet">
</head>

<body class="home-fixed">
    <header class="header">
        <div class="logo">
            <a href="#"><img src="immagini/logo-zip.png" alt="ZIP Logo"></a>
        </div>
    </header>

    <main class="grid-container" id="grid">
        <!-- Interactive tiles will be generated by JavaScript -->
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const gridContainer = document.getElementById('grid');
            const rows = 4;
            const cols = 8;
            const totalTiles = rows * cols;

            // Available images in the immagini directory
            const images = [
                'immagini/image1.jpeg',
                'immagini/image2.jpeg',
                'immagini/image3.jpeg',
                'immagini/image4.jpeg',
                'immagini/image5.jpeg',
                'immagini/image6.jpeg'
            ];

            for (let i = 0; i < totalTiles; i++) {
                const tile = document.createElement('div');
                tile.classList.add('tile');

                const tileInner = document.createElement('div');
                tileInner.classList.add('tile-inner');

                const tileFront = document.createElement('div');
                tileFront.classList.add('tile-front');
                
                // Inject responsive content for both desktop and mobile
                let frontHTML = '';
                
                // Desktop menu
                if (i === 5) frontHTML += '<span class="tile-text desktop-only">WORKS</span>';
                if (i === 6) frontHTML += '<span class="tile-text desktop-only">ABOUT</span>';
                if (i === 7) frontHTML += '<span class="tile-text desktop-only">CONTACTS</span>';
                
                // Mobile menu
                if (i === 0) frontHTML += '<span class="tile-text mobile-only">WORKS</span>';
                if (i === 1) frontHTML += '<span class="tile-text mobile-only">ABOUT</span>';
                if (i === 2) frontHTML += '<span class="tile-text mobile-only">CONTACTS</span>';
                
                // Mobile logo
                if (i === 4) frontHTML += '<img src="immagini/logo-zip.png" alt="ZIP" class="mobile-only logo-tile-img">';
                
                tileFront.innerHTML = frontHTML;

                const tileBack = document.createElement('div');
                tileBack.classList.add('tile-back');

                // Select a random image for the back of the tile
                const randomImg = images[Math.floor(Math.random() * images.length)];
                tileBack.style.backgroundImage = `url(${randomImg})`;

                // Append faces to inner, and inner to tile
                tileInner.appendChild(tileFront);
                tileInner.appendChild(tileBack);
                tile.appendChild(tileInner);

                // Add flip interaction or navigation
                tile.addEventListener('click', () => {
                    const tileText = tile.querySelector('.tile-text');
                    // Check if this specific tile is the 'WORKS' link
                    if (tileText && tileText.textContent === 'WORKS') {
                        window.location.href = 'works.html';
                    } else {
                        tile.classList.toggle('flipped');
                    }
                });

                gridContainer.appendChild(tile);
            }
        });
    </script>
</body>

</html>
